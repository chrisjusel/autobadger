{% extends "base.html" %}

{% block body_class %}login-page{% endblock %}

{% block content %}
  <div class="login-shell">
    <div class="card login-card hero">
      <div class="login-logo-wrap">
        <img class="login-logo" src="{{ url_for('static', filename='img/logo-badge.png') }}" alt="Corem Badger">
      </div>
      {% if message %}
        <div class="msg {% if 'errore' in message.lower() or 'non valida' in message.lower() %}msg-error{% endif %}" style="margin-bottom: 18px;">
          {{ message }}
        </div>
      {% endif %}
      <h1>Accedi</h1>
      <p class="muted">Inserisci le tue credenziali per accedere.</p>
      <form method="post" onsubmit="handleLoginSubmit(this)">
        <label>Username<input name="username" autocomplete="username" required></label>
        <label for="password">Password</label>
        <div class="input-eye-wrap">
          <input type="password" id="password" name="password" autocomplete="current-password" required>
          <button type="button" class="input-eye-btn" aria-label="Mostra password" onclick="togglePasswordVisibility(this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon eye-open"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon eye-closed" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div class="actions"><button type="submit">Accedi</button></div>
      </form>
    </div>
  </div>
  <script>
    function togglePasswordVisibility(btn) {
      const wrap = btn.closest('.input-eye-wrap');
      const input = wrap.querySelector('input');
      const eyeOpen = btn.querySelector('.eye-open');
      const eyeClosed = btn.querySelector('.eye-closed');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      eyeOpen.style.display = isPassword ? 'none' : '';
      eyeClosed.style.display = isPassword ? '' : 'none';
      btn.setAttribute('aria-label', isPassword ? 'Nascondi password' : 'Mostra password');
    }

    function handleLoginSubmit(form) {
      const btn = form.querySelector('button[type="submit"]');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Accesso in corso…';
        btn.style.opacity = '0.7';
      }
    }
  </script>
{% endblock %}
