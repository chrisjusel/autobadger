{% extends "base.html" %}

{% block content %}
  <div class="split">
    <div class="card pause-form-card">
      <h2>Nuova pausa</h2>
      <form method="post" action="{{ url_for('pauses_add') }}">
        <label>Data<input type="date" name="date" required></label>
        <div class="actions"><button>Aggiungi pausa</button></div>
      </form>
    </div>
    <div class="card table mobile-card-table">
      <h2>Pause configurate</h2>
      <table>
        <tbody>
          {% for pause in user.scheduled_pauses %}
            <tr>
              <td data-label="Data">{{ fmt_date(pause) }}</td>
              <td data-label="Azioni"><a class="btn danger" href="{{ url_for('pauses_delete', date=pause) }}">Rimuovi</a></td>
            </tr>
          {% else %}
            <tr class="empty-row"><td colspan="2">Nessuna pausa configurata.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
